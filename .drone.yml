kind: pipeline
name: default

steps:
  # 1. Build your website (e.g., Hugo, React, Jekyll)
  - name: build
    image: node:16 # Or appropriate build image
    commands:
      - npm install
      - npm run build # Assuming this generates a 'public' directory

  # 2. Publish to GitHub Pages
  - name: publish
    image: plugins/gh-pages
    settings:
      username: YOUR_GITHUB_USERNAME
      password:
        from_secret: git_password # The PAT secret from step 2
      pages_directory: public # The directory containing your static files
      target_branch: gh-pages # Branch to deploy to
    when:
      branch: main # Only deploy on push to main branch
