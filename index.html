<script>
/* =========================
   TRACKING CORE
========================= */
function track(event, data = {}) {
  if (window.gtag) {
    gtag("event", event, {
      event_category: "drone_funnel",
      event_label: window.location.href,
      ...data
    });
  }

  // optional: send to your SkymasterOS backend
  fetch("/api/hot-lead", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      event,
      url: window.location.href,
      timestamp: Date.now()
    })
  }).catch(() => {});
}

/* =========================
   CTA HANDLER
========================= */
function go(url, event) {
  track(event, { url });
  window.location.href = url;
}
</script>
